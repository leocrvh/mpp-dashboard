<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPP Challenge · Coupe du Monde 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <span class="header-trophy">🏆</span>
      <div>
        <div class="header-title">MPP Challenge</div>
        <div class="header-subtitle">Coupe du Monde 2026 · Canada / USA / Mexique</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge" id="liveBadge">
        <span class="live-dot"></span>
        <span id="liveText">EN DIRECT</span>
      </div>
      <div class="header-clock" id="clock">--:--</div>
      <div class="header-date" id="dateDisplay">--</div>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="main-grid">

    <!-- COLONNE GAUCHE : MPP réel en iframe -->
    <section class="panel panel-mpp">
      <div class="panel-header">
        <span class="panel-icon">👥</span>
        <span class="panel-title">Classement MPP</span>
        <a class="mpp-open-link" href="https://mpp.football/leagues/mpp_challenge_UC8MVG4F" target="_blank" title="Ouvrir MPP dans un nouvel onglet">↗</a>
      </div>
      <div class="iframe-wrap">
        <iframe
          id="mppFrame"
          src="https://mpp.football/leagues/mpp_challenge_UC8MVG4F"
          title="Classement MPP"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
        ></iframe>
      </div>
    </section>

    <!-- COLONNE DROITE : Matchs CdM ESPN -->
    <section class="panel panel-matches">
      <div class="panel-header">
        <span class="panel-icon">⚽</span>
        <span class="panel-title">Coupe du Monde 2026</span>
        <div class="refresh-info">Actu. dans <span id="countdown">60</span>s</div>
      </div>

      <div id="matches" class="matches"></div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <span id="status">Chargement…</span>
    <span id="updatedAt">Dernière mise à jour : --</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
